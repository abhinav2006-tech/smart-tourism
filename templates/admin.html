<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width:500px;">
        <h3 class="text-center mb-3">Admin Panel</h3>

       <form method="POST">

    <input type="text" name="name" class="form-control mb-3" placeholder="Destination Name">

    <textarea name="description" class="form-control mb-3" placeholder="Description"></textarea>

    <input type="text" name="location" class="form-control mb-3" placeholder="Location">

    <input type="text" name="best_time" class="form-control mb-3" placeholder="Best Time to Visit">

    <input type="text" name="famous_for" class="form-control mb-3" placeholder="Famous For">

    <input type="text" name="image" class="form-control mb-3" placeholder="Image URL">

    <button class="btn btn-dark w-100">Add Destination</button>

</form>



        <div class="text-center mt-3">
            <a href="/">Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
