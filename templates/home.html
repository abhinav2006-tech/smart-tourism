<!DOCTYPE html>
<html>
<head>
    <title>Smart Tourism</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Smart Tourism</a>
    <div>
      <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
      <a href="/register" class="btn btn-warning btn-sm">Register</a>
      <a href="/admin" class="btn btn-primary btn-sm">Admin</a>
    </div>
  </div>
</nav>

<!-- HERO SECTION -->
<div class="bg-primary text-white text-center py-5">
    <div class="container">
        <h1 class="display-4 fw-bold">Explore Incredible India</h1>
        <p class="lead">Discover beautiful destinations across the country</p>
    </div>
</div>

<!-- CAROUSEL -->
<div id="tourismCarousel" class="carousel slide mt-4 container" data-bs-ride="carousel">
  <div class="carousel-inner rounded shadow">

    <div class="carousel-item active">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Taj-Mahal.jpg" class="d-block w-100" style="height:400px; object-fit:cover;">
    </div>

    <div class="carousel-item">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Mysore_Palace_Morning.jpg" class="d-block w-100" style="height:400px; object-fit:cover;">
    </div>

    <div class="carousel-item">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Golden_Temple%2C_Amritsar.jpg" class="d-block w-100" style="height:400px; object-fit:cover;">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#tourismCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#tourismCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- DESTINATIONS SECTION -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Popular Destinations</h2>

    <div class="row">
        {% for place in destinations %}
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <img src="{{ place[6] }}" class="card-img-top" style="height:200px; object-fit:cover;">

                <div class="card-body">
    <h5 class="card-title fw-bold">{{ place[1] }}</h5>
    <p class="card-text">{{ place[2][:100] }}...</p>

    <a href="/destination/{{ place[0] }}" class="btn btn-primary btn-sm mt-2">
        View More
    </a>
</div>

            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
